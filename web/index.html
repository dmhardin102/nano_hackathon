<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hospitality Helper</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; margin: 0; padding: 16px; }
    h1 { margin: 0 0 12px; font-size: 20px; text-align: center; }
    .col { display: flex; flex-direction: column; align-items: center; max-width: 640px; margin: 0 auto; }
    .stage { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
    .panel { width: 100%; padding: 0 4px; box-sizing: border-box; }
    .bars { margin-top: 12px; }
    .bar { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-variant-numeric: tabular-nums; }
    .bar span { width: 80px; font-size: 14px; }
    .bar .track { flex: 1; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
    .bar .fill { height: 100%; background: #4caf50; width: 0%; transition: width .15s ease; }
    .bar.active .fill { background: #ffca28; }
    #status { margin-top: 12px; font-size: 13px; color: #9cf; white-space: pre-wrap; }
    #emotion { font-size: 40px; margin: 10px 0; text-align: center; }
    .loader { display: none; position: absolute; inset: 0; background: rgba(0,0,0,.7); z-index: 10; justify-content: center; align-items: center; flex-direction: column; gap: 12px; color: #9cf; font-size: 14px; }
    .loader.visible { display: flex; }
    .spinner { width: 36px; height: 36px; border: 3px solid #333; border-top-color: #9cf; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #retryBtn { display: none; margin-top: 10px; padding: 10px 20px; background: #4caf50; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    #retryBtn:hover { background: #43a047; }
    .error-msg { color: #f44336; font-size: 14px; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Hospitality Helper</h1>
  <div class="col">
    <div class="stage">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
      <div class="loader visible" id="loader"><div class="spinner"></div><span id="loaderText">Loading model…</span></div>
    </div>
    <div class="panel">
      <div id="emotion">—</div>
      <div class="bars" id="bars"></div>
      <div id="status">starting…</div>
      <button id="retryBtn">Grant Camera Access</button>
    </div>
  </div>
  <noscript><p style="color:#f44336;text-align:center;margin-top:20px;">JavaScript is required to run this app.</p></noscript>
  <script type="module" src="./app.js"></script>
</body>
</html>
